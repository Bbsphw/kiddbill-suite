# infra/docker-compose.prod.yml
services:
  kiddbill-db:
    image: postgres:16-alpine
    container_name: kiddbill-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Security: No ports exposed to host. Only internal docker network access.
    volumes:
      - kiddbill-db-data-prod:/var/lib/postgresql/data
    networks:
      - kiddbill-network-prod

  kiddbill-backend:
    build: 
      context: ../server
      dockerfile: Dockerfile.prod
    container_name: kiddbill-backend-prod
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      kiddbill-db:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@kiddbill-db:5432/${DB_NAME}?schema=public&pgbouncer=true
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      JWKS_URL: ${JWKS_URL}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY}
    networks:
      - kiddbill-network-prod

networks:
  kiddbill-network-prod:
    driver: bridge

volumes:
  kiddbill-db-data-prod:
    driver: local
