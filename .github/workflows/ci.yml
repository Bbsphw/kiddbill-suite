name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Setup Prisma
      run: pnpm db:generate

    - name: Lint and Typecheck
      run: pnpm turbo run lint typecheck format --continue

    - name: Run Tests
      run: pnpm turbo run test

    - name: Build
      run: pnpm turbo run build
      env:
        # Prevent actual database connections during build if any
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy?schema=public"
